<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>How We're Wired</title><style>
:root{--b:#f5f7fb;--c:#fff;--i:#182033;--m:#697386;--l:#dce3ee;--a:#3d5bdd}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(#edf1ff,#f7f8fc 35%);color:var(--i)}main{max-width:760px;margin:auto;padding:28px 16px 60px}h1{font-size:40px;margin:8px 0}.sub{color:var(--m);line-height:1.5}.card{background:var(--c);border:1px solid var(--l);border-radius:18px;padding:22px;margin-top:18px;box-shadow:0 10px 30px #1e2d5012}.row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1 1 220px}label{font-weight:700;display:block;margin-bottom:7px}input,textarea{width:100%;padding:13px;border:1px solid #cbd4e3;border-radius:12px;font:inherit}textarea{min-height:85px}.q{padding:18px 0;border-bottom:1px solid var(--l)}.q:last-child{border:0}.qt{font-weight:750;font-size:17px;margin-bottom:10px}.opts{display:flex;gap:8px;flex-wrap:wrap}.opts label{margin:0}.opts input{display:none}.opts span{display:block;padding:10px 13px;border:1px solid #cbd4e3;border-radius:999px;cursor:pointer}.opts input:checked+span{background:#edf1ff;border-color:var(--a);color:var(--a);font-weight:700}button{border:0;border-radius:12px;padding:13px 17px;font-weight:800;cursor:pointer;background:var(--a);color:white;margin-top:18px}.hidden{display:none}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.ans{border:1px solid var(--l);border-radius:12px;padding:12px;background:#fafbfe}.ans b{display:block;margin-bottom:5px}@media(max-width:600px){.grid{grid-template-columns:1fr}h1{font-size:33px}}</style></head><body><main><div><small>CONNECTION EXPERIMENT</small><h1>How We're Wired</h1><p class="sub">A quick, low-pressure way for two people to discover common ground, differences, and things they never thought to ask.</p></div>
<section class="card" id="intro"><h2>Start here</h2><p class="sub">Answer quickly. No right answers, no debates. When finished, share the generated link with the other person.</p><div class="row"><div><label>Your name</label><input id="name" placeholder="Your name"></div><div><label>Other person's name</label><input id="other" placeholder="Their name"></div></div><button id="start">Start</button><p id="note" class="sub hidden"></p></section><form class="card hidden" id="quiz"></form><section class="card hidden" id="result"></section></main>
<script>
const Q=[['p','Morning or night?',['Morning','Night','Depends']],['p','Beach, mountains, or city?',['Beach','Mountains','City']],['p','Plan it or wing it?',['Plan it','Wing it','Both']],['t','What topic can you discuss for an hour without getting bored?'],['t','What have you learned recently that surprised you?'],['t','What technology will matter most in the next 10 years?'],['p','What comes first in a big decision?',['Logic','Instinct','Research','Conversation']],['t','What opinion have you changed in recent years?'],['t','What does a really good Saturday look like?'],['t','What do people often misunderstand about you?'],['t','What are you better at than most people?'],['t','What would you like to improve?'],['t','What makes you lose track of time?'],['t','What do you think we have in common?'],['t','What should we do together more often?'],['t','What is one thing you appreciate about the other person?'],['t','What are you curious to know about the other person?'],['t','What do you hope we are still doing together 20 years from now?']];
let incoming=null;const $=x=>document.getElementById(x);function enc(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}function dec(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return JSON.parse(decodeURIComponent(escape(atob(s))))}try{if(location.hash.startsWith('#r=')){incoming=dec(location.hash.slice(3));$('other').value=incoming.name;$('note').classList.remove('hidden');$('note').textContent=incoming.name+' already completed it. Fill yours out to compare.'}}catch(e){}
$('start').onclick=()=>{if(!$('name').value.trim())return alert('Enter your name.');$('intro').classList.add('hidden');$('quiz').classList.remove('hidden');$('quiz').innerHTML='<h2>Your answers</h2>'+Q.map((q,i)=>'<div class="q"><div class="qt">'+(i+1)+'. '+q[1]+'</div>'+(q[0]=='p'?'<div class="opts">'+q[2].map(o=>'<label><input type="radio" name="q'+i+'" value="'+o+'" required><span>'+o+'</span></label>').join('')+'</div>':'<textarea name="q'+i+'" required></textarea>')+'</div>').join('')+'<button>Finish</button>'};
$('quiz').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target),me={name:$('name').value.trim(),other:$('other').value.trim(),answers:Q.map((_,i)=>String(f.get('q'+i)||''))};$('quiz').classList.add('hidden');$('result').classList.remove('hidden');if(incoming){$('result').innerHTML='<h2>'+me.name+' + '+incoming.name+'</h2><p class="sub">Compare with curiosity. No scoring, correcting, or debating.</p>'+Q.map((q,i)=>'<div class="q"><div class="qt">'+q[1]+'</div><div class="grid"><div class="ans"><b>'+incoming.name+'</b>'+safe(incoming.answers[i])+'</div><div class="ans"><b>'+me.name+'</b>'+safe(me.answers[i])+'</div></div></div>').join('')+'<button onclick="print()">Print / Save PDF</button>'}else{const link=location.href.split('#')[0]+'#r='+enc(me);$('result').innerHTML='<h2>Done, '+me.name+'.</h2><p class="sub">Send this link to '+(me.other||'the other person')+'. Their answers will appear beside yours after they finish.</p><textarea id="link" readonly>'+link+'</textarea><button id="copy">Copy link</button><p class="sub">Answers are stored inside the link. No account or server is required.</p>';$('copy').onclick=async()=>{await navigator.clipboard.writeText(link);$('copy').textContent='Copied'}}};function safe(s){return String(s||'—').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
</script></body></html>
