<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connect Canvas</title><meta name="description" content="A place to notice what is happening between us.">
<style>
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:#10233c;background:radial-gradient(circle at 18% 15%,rgba(255,255,255,.9),transparent 22%),radial-gradient(circle at 82% 25%,rgba(255,255,255,.7),transparent 22%),linear-gradient(180deg,#8fc8f7 0%,#cbe8fb 52%,#f8fbfd 100%);background-attachment:fixed}.cloud{position:fixed;border-radius:999px;background:rgba(255,255,255,.43);filter:blur(2px);animation:drift 18s ease-in-out infinite alternate;pointer-events:none}.c1{width:260px;height:62px;top:18%;left:-40px}.c2{width:340px;height:75px;top:35%;right:-120px;animation-duration:24s}@keyframes drift{to{transform:translateX(28px)}}main{min-height:100vh;display:grid;place-items:center;padding:24px;position:relative;z-index:1}.panel{width:min(760px,100%);padding:38px 30px;background:rgba(255,255,255,.48);border:1px solid rgba(255,255,255,.78);border-radius:30px;box-shadow:0 24px 80px rgba(35,89,140,.18);backdrop-filter:blur(16px)}.center{text-align:center}.eyebrow{margin:0 0 12px;letter-spacing:.16em;text-transform:uppercase;font-size:12px;font-weight:800;color:#315f89}h1{margin:0;font-size:clamp(44px,8vw,78px);line-height:.98;letter-spacing:-.055em}h2{font-size:clamp(30px,5vw,48px);margin:0 0 14px;letter-spacing:-.035em}.tagline,.muted{color:#355774;line-height:1.55}.tagline{font-size:clamp(18px,3vw,23px);max-width:520px;margin:22px auto}.btn{appearance:none;border:0;border-radius:999px;padding:14px 22px;background:#123b66;color:white;font:inherit;font-weight:800;cursor:pointer;box-shadow:0 10px 26px rgba(18,59,102,.22)}.btn.alt{background:rgba(255,255,255,.78);color:#123b66;border:1px solid rgba(18,59,102,.12);box-shadow:none}.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}input,textarea,select{width:100%;padding:14px 15px;border:1px solid rgba(31,77,119,.18);border-radius:14px;background:rgba(255,255,255,.76);font:inherit;color:#10233c;outline:none}input:focus,textarea:focus,select:focus{border-color:#3979b5;box-shadow:0 0 0 4px rgba(57,121,181,.12)}textarea{min-height:110px;resize:vertical}label{display:block;font-weight:800;margin-bottom:8px}.field{margin-top:20px}.hidden{display:none!important}.moment{padding:18px 0;border-top:1px solid rgba(31,77,119,.12)}.moment:first-of-type{border-top:0}.moment h3{margin:0 0 12px;font-size:19px}.choices{display:flex;flex-wrap:wrap;gap:9px}.choice input{display:none}.choice span{display:block;padding:10px 13px;border:1px solid rgba(31,77,119,.18);border-radius:999px;background:rgba(255,255,255,.62);cursor:pointer}.choice input:checked+span{background:#123b66;color:white;border-color:#123b66}.status{display:inline-flex;align-items:center;gap:9px;padding:9px 14px;border-radius:999px;background:rgba(255,255,255,.65);font-weight:750;color:#315f89}.dot{width:8px;height:8px;border-radius:50%;background:#2e9d73;box-shadow:0 0 0 5px rgba(46,157,115,.12)}.share{display:flex;gap:8px;margin-top:18px}.share input{font-size:13px}.sky{height:220px;border-radius:24px;margin:18px 0 26px;background:radial-gradient(circle at 75% 28%,rgba(255,222,130,.72),transparent 15%),radial-gradient(circle at 30% 32%,rgba(255,255,255,.82),transparent 17%),linear-gradient(155deg,#82c4f4,#9bd3ea 42%,#d5e8be 75%,#f2c8a0);position:relative;overflow:hidden;box-shadow:inset 0 0 70px rgba(255,255,255,.28)}.sky:after{content:"";position:absolute;left:-8%;right:-8%;bottom:-45px;height:110px;border-radius:50%;background:rgba(55,107,87,.35);filter:blur(6px)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{padding:18px;border-radius:18px;background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.7)}.card b{display:block;margin-bottom:7px}.wide{grid-column:1/-1}.error{color:#8d2f2f;font-weight:700;margin-top:14px}.small{font-size:13px}.name-list{font-weight:800;margin:12px 0}.spinner{width:28px;height:28px;border:3px solid rgba(18,59,102,.18);border-top-color:#123b66;border-radius:50%;animation:spin .8s linear infinite;margin:12px auto}@keyframes spin{to{transform:rotate(360deg)}}footer{text-align:center;padding:0 20px 20px;color:rgba(31,70,104,.66);font-size:13px}@media(max-width:650px){.panel{padding:28px 20px;border-radius:24px}.grid{grid-template-columns:1fr}.share{flex-direction:column}}
</style>
</head>
<body><div class="cloud c1"></div><div class="cloud c2"></div><main><section class="panel" id="app"><div class="center"><div class="spinner"></div><p class="muted">Opening the canvas…</p></div></section></main><footer>Not a permanent answer. A better next understanding.</footer>
<script>
const app=document.getElementById('app');const params=new URLSearchParams(location.search);const canvasToken=params.get('c');const api='/api/canvas';
const moments=[
{type:'choice',q:'When something matters, what usually comes first?',options:[['understand','Understand it'],['act','Act on it'],['talk','Talk it through'],['reflect','Sit with it']]},
{type:'choice',q:'Which matters most in a difficult decision?',options:[['freedom','Freedom'],['security','Security'],['fairness','Fairness'],['loyalty','Loyalty'],['growth','Growth'],['responsibility','Responsibility']]},
{type:'choice',q:'How would you most enjoy seeing what emerges?',options:[['image','An image'],['pattern','A pattern'],['story','A story'],['map','A map'],['surprise','Surprise me']]},
{type:'text',q:'What is something this person does that you respect?'},
{type:'text',q:'What is one small memory, habit, or shared effort that feels like “us”?'},
];
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function call(method,body,query=''){const r=await fetch(api+query,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});const data=await r.json();if(!r.ok)throw new Error(data.error||'Something went wrong.');return data}
function home(){app.innerHTML=`<div class="center"><p class="eyebrow">A shared space for discovery</p><h1>Connect Canvas</h1><p class="tagline">A place to notice what is happening between us.</p><div class="actions"><button class="btn" id="start">Start a canvas</button></div></div>`;document.getElementById('start').onclick=create}
async function create(){app.innerHTML=`<div class="center"><div class="spinner"></div><p class="muted">Making a new space…</p></div>`;try{const d=await call('POST',{action:'create'});location.href='/?c='+encodeURIComponent(d.token)}catch(e){showError(e)}}
function nameScreen(state){const existing=state.names?.length?`<p class="muted"><b>${esc(state.names[0])}</b> has already added a perspective.</p>`:'';app.innerHTML=`<p class="eyebrow">Enter the shared space</p><h2>What should we call you?</h2>${existing}<div class="field"><label for="name">Name or nickname</label><input id="name" maxlength="40" autocomplete="name" placeholder="Your name"></div><div class="actions"><button class="btn" id="join">Continue</button></div><p class="error hidden" id="err"></p>`;document.getElementById('join').onclick=join}
async function join(){const name=document.getElementById('name').value.trim();if(!name)return setErr('Please enter a name.');try{const d=await call('POST',{action:'join',token:canvasToken,name});localStorage.setItem('cc:'+canvasToken,d.sessionToken);showMoments(name)}catch(e){setErr(e.message)}}
function showMoments(name){app.innerHTML=`<p class="eyebrow">A few moments of discovery</p><h2>Hello, ${esc(name)}.</h2><p class="muted">Respond quickly. There is nothing to get right.</p><form id="form">${moments.map((m,i)=>`<div class="moment"><h3>${esc(m.q)}</h3>${m.type==='choice'?`<div class="choices">${m.options.map(o=>`<label class="choice"><input required type="radio" name="m${i}" value="${o[0]}"><span>${o[1]}</span></label>`).join('')}</div>`:`<textarea required name="m${i}" placeholder="A few words is enough."></textarea>`}</div>`).join('')}<div class="actions"><button class="btn">Place my perspective</button></div><p class="error hidden" id="err"></p></form>`;document.getElementById('form').onsubmit=submitMoments}
async function submitMoments(e){e.preventDefault();const fd=new FormData(e.target);const answers=moments.map((_,i)=>fd.get('m'+i));try{await call('POST',{action:'respond',token:canvasToken,sessionToken:localStorage.getItem('cc:'+canvasToken),answers});await load()}catch(err){setErr(err.message)}}
function waiting(state){const link=location.href;app.innerHTML=`<div class="center"><p class="eyebrow">Your perspective is here</p><h2>Waiting for another perspective</h2><div class="status"><span class="dot"></span> One perspective is resting on the canvas</div><p class="muted">Share this same link with someone you want to understand a little better.</p><div class="share"><input id="link" value="${esc(link)}" readonly><button class="btn" id="copy">Copy link</button></div><p class="name-list">${state.names.map(esc).join(' · ')}</p><div class="actions"><button class="btn alt" id="check">See if something new is ready</button></div></div>`;document.getElementById('copy').onclick=async()=>{await navigator.clipboard.writeText(link);document.getElementById('copy').textContent='Copied'};document.getElementById('check').onclick=load}
function result(state){const r=state.reflection;app.innerHTML=`<p class="eyebrow">Here is what emerged</p><h2>${state.names.map(esc).join(' + ')}</h2><div class="sky" aria-label="A blended sky representing this connection"></div><div class="grid">${r.shared.map(x=>`<div class="card"><b>${esc(x)}</b><span class="muted small">A shared thread appearing in both perspectives.</span></div>`).join('')}<div class="card wide"><b>Different starting points</b><span class="muted">${esc(r.different)}</span></div><div class="card wide"><b>Something worth wondering about</b><span class="muted">${esc(r.curiosity)}</span></div><div class="card wide"><b>A small experiment</b><span class="muted">${esc(r.experiment)}</span></div><div class="card wide"><b>A conversation to carry forward</b><span class="muted">${esc(r.prompt)}</span></div></div><div class="actions"><button class="btn alt" onclick="location.href='/'">Start a fresh canvas</button><button class="btn" onclick="location.reload()">Return to this canvas</button></div>`}
async function load(){if(!canvasToken)return home();try{const state=await call('GET',null,'?token='+encodeURIComponent(canvasToken));if(state.ready)return result(state);const session=localStorage.getItem('cc:'+canvasToken);if(session&&state.completedCount>=1)return waiting(state);if(state.participantCount>=2&&!session){app.innerHTML=`<div class="center"><h2>Both perspectives are already here.</h2><p class="muted">This shared canvas is complete on the devices that created it.</p></div>`;return}nameScreen(state)}catch(e){showError(e)}}
function setErr(msg){const el=document.getElementById('err');if(el){el.textContent=msg;el.classList.remove('hidden')}}function showError(e){app.innerHTML=`<div class="center"><h2>The canvas paused.</h2><p class="muted">${esc(e.message)}</p><div class="actions"><button class="btn" onclick="location.reload()">Try again</button></div></div>`}
load();
</script></body></html>
