<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connect Canvas</title>
  <meta name="description" content="A place to notice what is happening between us." />
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #10233c;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.95) 0 7%, transparent 23%),
        radial-gradient(circle at 78% 22%, rgba(255,255,255,.72) 0 5%, transparent 20%),
        linear-gradient(180deg, #8fc8f7 0%, #cbe8fb 53%, #f8fbfd 100%);
      overflow: hidden;
    }
    .cloud {
      position: fixed;
      border-radius: 999px;
      background: rgba(255,255,255,.5);
      filter: blur(2px);
      animation: drift 18s ease-in-out infinite alternate;
    }
    .cloud.one { width: 260px; height: 62px; top: 18%; left: -40px; }
    .cloud.two { width: 340px; height: 75px; top: 34%; right: -120px; animation-duration: 24s; }
    @keyframes drift { from { transform: translateX(-8px); } to { transform: translateX(28px); } }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      position: relative;
      z-index: 1;
    }
    .panel {
      width: min(720px, 100%);
      padding: 46px 34px;
      text-align: center;
      background: rgba(255,255,255,.42);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 30px;
      box-shadow: 0 24px 80px rgba(35,89,140,.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .eyebrow {
      margin: 0 0 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 800;
      color: #315f89;
    }
    h1 {
      margin: 0;
      font-size: clamp(48px, 9vw, 88px);
      line-height: .95;
      letter-spacing: -.055em;
      font-weight: 750;
    }
    .tagline {
      max-width: 520px;
      margin: 24px auto 0;
      font-size: clamp(18px, 3vw, 24px);
      line-height: 1.45;
      color: #355774;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-top: 34px;
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,.58);
      color: #315f89;
      font-size: 14px;
      font-weight: 700;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2e9d73;
      box-shadow: 0 0 0 5px rgba(46,157,115,.12);
    }
    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      text-align: center;
      color: rgba(31,70,104,.66);
      font-size: 13px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="cloud one"></div>
  <div class="cloud two"></div>
  <main>
    <section class="panel">
      <p class="eyebrow">A shared space for discovery</p>
      <h1>Connect Canvas</h1>
      <p class="tagline">A place to notice what is happening between us.</p>
      <div class="status"><span class="dot"></span> Something thoughtful is taking shape</div>
    </section>
  </main>
  <footer>Not a permanent answer. A better next understanding.</footer>
</body>
</html>
